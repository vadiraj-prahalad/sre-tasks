<!DOCTYPE html>
<html>
<head>
    <title>Kannada AI Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }

        h1 {
            color: #333;
        }

        .draft {
            background: white;
            margin-bottom: 20px;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.12);
        }

        .question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .meta {
            color: #555;
            margin-bottom: 12px;
            font-size: 14px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input,
        textarea,
        select {
            width: 100%;
            box-sizing: border-box;
            margin-top: 6px;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        textarea {
            min-height: 180px;
            white-space: pre-wrap;
        }

        .actions {
            margin-top: 14px;
        }

        button {
            padding: 9px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .approve {
            background: #1f8f4d;
            color: white;
        }

        .delete {
            background: #c0392b;
            color: white;
        }

        .message {
            margin: 15px 0;
            font-weight: bold;
        }
            .validation-panel {
            margin: 12px 0;
            padding: 12px;
            border-radius: 6px;
            background: #f3f5f7;
            border: 1px solid #d8dde3;
        }

        .validation-header {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .validation-pass {
            color: #176b38;
        }

        .validation-fail {
            color: #a93226;
        }

        .validation-metrics {
            color: #444;
            font-size: 14px;
            line-height: 1.6;
        }

        .validation-warning {
            margin-top: 8px;
            color: #8a5a00;
        }

        .validation-error {
            margin-top: 8px;
            color: #a93226;
        }
    </style>
</head>

<body>
    <h1>Kannada AI Admin Portal</h1>
    <p>Review imported drafts, edit the Kannada answer, and approve trusted knowledge.</p>

    <div id="message" class="message"></div>
    <div id="drafts"></div>

    <script>
                function renderValidation(validation) {
            if (!validation) {
                return `
                    <div class="validation-panel">
                        <div class="validation-header">
                            Editorial validation: Not applicable
                        </div>
                    </div>
                `;
            }

            const metrics = validation.metrics || {};
            const warnings = validation.warnings || [];
            const errors = validation.errors || [];

            const ratio = Number(
                metrics.kannada_ratio || 0
            );

            const kannadaPercentage = (
                ratio * 100
            ).toFixed(1);

            const statusClass = validation.valid
                ? "validation-pass"
                : "validation-fail";

            const statusText = validation.valid
                ? "PASS"
                : "FAIL";

            const warningHtml = warnings.length
                ? `
                    <div class="validation-warning">
                        Warnings:
                        ${warnings
                            .map(item => escapeHtml(item))
                            .join("<br>")}
                    </div>
                `
                : "";

            const errorHtml = errors.length
                ? `
                    <div class="validation-error">
                        Errors:
                        ${errors
                            .map(item => escapeHtml(item))
                            .join("<br>")}
                    </div>
                `
                : "";

            return `
                <div class="validation-panel">
                    <div class="validation-header ${statusClass}">
                        Editorial validation: ${statusText}
                    </div>

                    <div class="validation-metrics">
                        Kannada content: ${kannadaPercentage}% |
                        Sections: ${metrics.section_count || 0} |
                        Content sections:
                        ${metrics.content_section_count || 0} |
                        Content blocks:
                        ${metrics.content_block_count || 0} |
                        Duplicate blocks:
                        ${metrics.duplicate_block_count || 0}
                    </div>

                    ${warningHtml}
                    ${errorHtml}
                </div>
            `;
        }
        async function loadDrafts() {
            try {
                const response = await fetch("/admin/drafts");
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(
                        data.detail || `Unable to load drafts. Status: ${response.status}`
                    );
                }

                let html = "";

                data.drafts
                    .filter(d => d.status === "draft")
                    .forEach(d => {
                        html += `
                            <div class="draft" id="draft-${d.id}">
                                <div class="question">${escapeHtml(d.question)}</div>

                                <div class="meta">
                                    ID: ${d.id} |
                                    Type: ${escapeHtml(d.draft_type || "legacy")} |
                                    Status: ${escapeHtml(d.status)} |
                                    Hits: ${d.hit_count} |
                                    Updated: ${escapeHtml(d.updated_at)}
                                </div>
                                    ${renderValidation(
                                    d.editorial_validation
                                )}

                                <label>Approved Question</label>
                                <input
                                    id="question-${d.id}"
                                    value="${escapeHtml(d.question)}"
                                />

                                <label>Source Evidence</label>
                                <textarea readonly>${escapeHtml(d.evidence || d.answer || "")}</textarea>

                                ${
                                    d.editorial_warnings
                                        ? `
                                            <label>Editorial Warnings</label>
                                            <textarea readonly>${escapeHtml(d.editorial_warnings)}</textarea>
                                        `
                                        : ""
                                }

                                <label>Suggested Kannada Answer — Review Before Approval</label>
                                <textarea
                                    id="answer-${d.id}"
                                    placeholder="Review and edit the suggested Kannada answer before publishing."
                                >${escapeHtml(d.suggested_answer || "")}</textarea>

                                <label>Category</label>
                                <select id="category-${d.id}">
                                    <option value="history" ${d.category === "history" ? "selected" : ""}>history</option>
                                    <option value="location" ${d.category === "location" ? "selected" : ""}>location</option>
                                    <option value="literature" ${d.category === "literature" ? "selected" : ""}>literature</option>
                                    <option value="culture" ${d.category === "culture" ? "selected" : ""}>culture</option>
                                    <option value="religion" ${d.category === "religion" ? "selected" : ""}>religion</option>
                                    <option value="language" ${d.category === "language" ? "selected" : ""}>language</option>
                                    <option value="grammar" ${d.category === "grammar" ? "selected" : ""}>grammar</option>
                                    <option value="cinema" ${d.category === "cinema" ? "selected" : ""}>cinema</option>
                                    <option value="general" ${!d.category || d.category === "general" ? "selected" : ""}>general</option>
                                </select>

                                <div class="actions">
                                    <button
                                        id="approve-${d.id}"
                                        class="approve"
                                        onclick="approveDraft(${d.id})"
                                    >
                                        Approve
                                    </button>

                                    <button
                                        class="delete"
                                        onclick="deleteDraft(${d.id})"
                                    >
                                        Delete
                                    </button>
                                </div>
                            </div>
                        `;
                    });

                document.getElementById("drafts").innerHTML =
                    html || "No pending drafts found.";
            } catch (error) {
                showMessage(`Failed to load drafts: ${error.message}`);
            }
        }

        async function approveDraft(id) {
            const questionInput = document.getElementById(`question-${id}`);
            const answerInput = document.getElementById(`answer-${id}`);
            const categoryInput = document.getElementById(`category-${id}`);
            const approveButton = document.getElementById(`approve-${id}`);

            const question = questionInput.value.trim();
            const answer = answerInput.value.trim();
            const category = categoryInput.value.trim();

            if (!question) {
                showMessage(`Draft ${id}: approved question cannot be empty.`);
                questionInput.focus();
                return;
            }

            if (!answer) {
                showMessage(`Draft ${id}: approved answer cannot be empty.`);
                answerInput.focus();
                return;
            }

            if (!category) {
                showMessage(`Draft ${id}: category cannot be empty.`);
                categoryInput.focus();
                return;
            }

            approveButton.disabled = true;
            approveButton.innerText = "Publishing...";

            try {
                const response = await fetch(`/admin/drafts/${id}/approve`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        question,
                        answer,
                        category,
                    }),
                });

                const responseData = await response.json();

                if (!response.ok) {
                    throw new Error(
                        responseData.detail ||
                        `Approval failed with status ${response.status}.`
                    );
                }

                showMessage(
                    `Draft ${id} approved and published successfully. ` +
                    `Loaded ${responseData.publish.records_loaded} records; ` +
                    `evaluation passed ${responseData.publish.evaluation.passed}, ` +
                    `failed ${responseData.publish.evaluation.failed}.`
                );

                await loadDrafts();
            } catch (error) {
                showMessage(`Failed to approve draft ${id}: ${error.message}`);
                approveButton.disabled = false;
                approveButton.innerText = "Approve";
            }
        }

        async function deleteDraft(id) {
            if (!confirm("Delete this draft?")) {
                return;
            }

            try {
                const response = await fetch(`/admin/drafts/${id}`, {
                    method: "DELETE",
                });

                const responseData = await response.json();

                if (!response.ok) {
                    throw new Error(
                        responseData.detail ||
                        `Delete failed with status ${response.status}.`
                    );
                }

                showMessage(`Draft ${id} deleted.`);
                await loadDrafts();
            } catch (error) {
                showMessage(`Failed to delete draft ${id}: ${error.message}`);
            }
        }

        function showMessage(text) {
            document.getElementById("message").innerText = text;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        loadDrafts();
    </script>
</body>
</html>
